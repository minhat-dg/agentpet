<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AgentPet , Settings</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="settings">
    <div class="topbar">
      <h1>AgentPet</h1>
      <select id="lang" class="lang-select">
        <option value="en">English</option>
        <option value="vi">Tiếng Việt</option>
        <option value="zh">中文</option>
      </select>
    </div>

    <h2 class="section" id="t-pet">Your pet</h2>
    <div class="sub" id="t-pet-sub">Pick the companion that floats on your desktop.</div>
    <div id="pet-current" class="pet-current"></div>
    <div class="pet-controls">
      <input id="pet-search" type="text" placeholder="Search pets by name..." autocomplete="off" />
      <button id="pet-random" title="Surprise me">🎲</button>
    </div>
    <div id="pet-results" class="pet-results"></div>

    <h2 class="section" id="t-bubble">Bubble</h2>
    <div class="bubble-row"><span id="t-theme">Theme</span>
      <select id="theme"><option value="dark" id="o-dark">Dark</option><option value="light" id="o-light">Light</option></select></div>
    <div class="bubble-row"><span id="t-opacity">Opacity</span>
      <input type="range" id="opacity" min="60" max="100" /></div>
    <div class="bubble-row"><span id="t-fontsize">Text size</span>
      <input type="range" id="font-size" min="10" max="18" /></div>
    <div class="bubble-row"><span id="t-font">Font</span>
      <select id="font-family">
        <option value="system" id="o-system">System</option>
        <option value="rounded" id="o-rounded">Rounded</option>
        <option value="mono" id="o-mono">Monospace</option>
      </select></div>
    <div class="sub" id="t-msg-help">Custom messages (one per line, leave empty for default)</div>
    <div class="bubble-row"><span id="t-msg-agent">For agent</span><select id="msg-agent"></select></div>
    <div id="msg-editors"></div>

    <h2 class="section" id="t-agents">Agent integrations</h2>
    <div class="sub" id="t-agents-sub">Install a hook so AgentPet can see when an agent works, finishes, or needs you.</div>
    <div id="agents"></div>

    <h2 class="section" id="t-notif">Notifications</h2>
    <label class="toggle-row"><input type="checkbox" id="notify" /> <span id="t-notify">Notify when an agent finishes or needs you</span></label>

    <h2 class="section" id="t-startup">Startup</h2>
    <label class="toggle-row"><input type="checkbox" id="autostart" /> <span id="t-autostart">Start AgentPet when Windows starts</span></label>

    <script type="module" src="/src/settings.ts"></script>
  </body>
</html>
